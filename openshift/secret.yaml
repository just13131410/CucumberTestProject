# Fallback wenn Vault nicht verfügbar (z.B. Minikube, lokales CRC).
# Bei aktivem Vault diese Datei NICHT anwenden – Vault injiziert die Secrets.
#
# Das Secret wird als Datei-Volume unter /etc/config gemountet (CONFIGPATH).
# ConfigReader liest alle *.properties-Dateien aus diesem Verzeichnis.
#
# Manuell anlegen statt Datei anwenden:
#   oc create secret generic cucumber-test-secrets \
#     --from-literal=api-secrets.properties=$'api.token=REPLACE_ME\nzephyr.api-token=REPLACE_ME\njira.api-token=REPLACE_ME' \
#     -n test-automation
apiVersion: v1
kind: Secret
metadata:
  name: cucumber-test-secrets
  namespace: test-automation
  labels:
    app: cucumber-test-service
type: Opaque
stringData:
  # Jede Datei hier wird als Datei unter /etc/config/ gemountet.
  # Schlüssel = Dateiname, Wert = Dateiinhalt (Properties-Format).
  api-secrets.properties: |
    api.token=REPLACE_ME
    zephyr.api-token=REPLACE_ME
    jira.api-token=REPLACE_ME
