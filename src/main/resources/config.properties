# Browser
# Wird nur genutzt, wenn playwright.mirror.enabled=false (externer Browser).
browser.executable.path=C:/Program Files/Google/Chrome/Application/chrome.exe

# Playwright Browser-Download über internen Mirror
# mirror.enabled=true  → Playwright-eigener Browser, per Mirror geladen (browser.executable.path wird ignoriert)
# mirror.enabled=false → externer Browser via browser.executable.path (Legacy-Verhalten)
playwright.mirror.enabled=true
# Basis-URL des Mirrors → wird als PLAYWRIGHT_DOWNLOAD_HOST an den Treiber übergeben.
# Env-Var-Form (OpenShift/Docker): PLAYWRIGHT_DOWNLOAD_HOST
playwright.download.host=http://playwright-mirror:10123
# Chromium-spezifischer Host (PLAYWRIGHT_CHROMIUM_DOWNLOAD_HOST). Leer = automatisch aus
# playwright.download.host + "/builds/cft" abgeleitet. Grund: Playwright hängt für Chromium
# nur <version>/<platform>/chrome-*.zip an; der Mirror liefert diese Chrome-for-Testing-
# Binaries unter /builds/cft/ aus (→ Google storage). Nur setzen, wenn der Mirror einen
# anderen Präfix nutzt.
playwright.chromium.download.host=
# Persistenter Browser-Cache (Reuse über Läufe hinweg). Leer = OS-Standard-Cache.
# Env-Var-Form (OpenShift/Docker): PLAYWRIGHT_BROWSERS_PATH
playwright.browsers.path=
# Browser bereits beim App-Start laden? Default false (Unit-Tests sollen nichts laden).
# In Prod/OpenShift und beim lokalen App-Start auf true setzen.
playwright.install.on-startup=false
# Welcher Browser beim Start geladen wird (überschreibbar per -Dbrowser).
playwright.browser=chromium

# Application URLs
baseUrl=http://localhost:4200/
apiURL=https://api.github.com
todoApiUrl=http://localhost:3000
# api.token wird ausschließlich über Secrets gesetzt (CONFIGPATH oder .env), nie hier eintragen

# PDF-Quelle für ApiSteps.
# Dev (leer): Datei liegt lokal im Projektordner, z.B. ./Response.pdf
# Prod:       HTTP-Basis-URL zum OpenShift-Server, wird durch PDF_BASE_URL Env-Var gesetzt.
#             Beispiel: https://cucumber-test-service-test-automation.apps-crc.testing/reports
pdf.base.url=

# Report Paths (dynamically set by TestContext, these are fallbacks)
# Dev: test-results (relative to project root)
# Prod: /app/test-results (container path via env var)
axe.reportPath=target/axe-result/
reportPath=target/reports/

# Zephyr Scale Integration (Optional)
